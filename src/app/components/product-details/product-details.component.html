@if (product) {
  <div class="selected-product">
    <div class="selected-product-tool">
      <button (click)="cancelAdding()">X</button>
    </div>
    <h2>{{ product.name | uppercase }} Details</h2>
    <div><span>id: </span>{{ product.id }}</div>
    <div><span>name: </span>{{ product.name }}</div>
    <div><span>price: </span>{{ product.price * product.quantity }}</div>
    <div>
      <label
        >quantity:
        <input
          class="input"
          [(ngModel)]="product.quantity"
          placeholder="quantity"
          type="number"
          min="0"
          autofocus
          />
        </label>
      </div>
      @if (!(product.quantity > 0)) {
        <p class="error-message">
          The value should be greater than zero
        </p>
      }
      @if (product.quantity > 0) {
        <app-button
          (click)="addToCart()"
        >add the product to the cart</app-button>
      }
    </div>
  }
